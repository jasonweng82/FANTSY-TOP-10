name: Yahoo Fantasy MLB Daily Bot

on:
  schedule:
    # 每天台灣時間下午 15:00 (UTC 07:00)
    - cron: "0 7 * * *"
    # 每週一台灣時間下午 3:00 (UTC 07:00) — 週報
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore rank cache
        uses: actions/cache@v4
        with:
          path: rank_cache.json
          key: rank-cache-${{ github.run_id }}
          restore-keys: |
            rank-cache-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pillow
          sudo apt-get install -y fonts-noto-cjk

      - name: Run Fantasy Bot
        env:
          YAHOO_CLIENT_ID:      ${{ secrets.YAHOO_CLIENT_ID }}
          YAHOO_CLIENT_SECRET:  ${{ secrets.YAHOO_CLIENT_SECRET }}
          YAHOO_REFRESH_TOKEN:  ${{ secrets.YAHOO_REFRESH_TOKEN }}
          YAHOO_LEAGUE_ID:      ${{ secrets.YAHOO_LEAGUE_ID }}
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python yahoo_fantasy_bot.py

      - name: Save rank cache
        uses: actions/cache/save@v4
        with:
          path: rank_cache.json
          key: rank-cache-${{ github.run_id }}
